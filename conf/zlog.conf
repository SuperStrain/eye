[global]
# 不自动重载（嵌入式减少解析 IO）
reload conf period = 0
# 严格语法检查（发现配置错误，程序启动失败，避免运行时异常）
strict init = true

# 缓冲策略（每线程缓冲）
# buffer min 设为 1KB，启动时少量分配；buffer max 设为 4KB，避免在高并发时占用过多内存
buffer min = 1KB
buffer max = 4KB

# fsync 策略：每 1024 次写一次 fsync，折中数据安全与 flash 擦写
# 若更担心数据完整性，可再降低该值，但会增加擦写频率
fsync period = 1024

# 创建 log 文件权限（受 umask 影响）
file perms = 0640

# 锁文件位置（多进程写同一文件时确保此路径可写）
rotate lock file = /app/conf/zlog.lock

# 默认格式尽量精简以减少每条日志字节数
default format = "%d %V [%c] %F %m%n"

[formats]
storage_compact  =  "[%d(%T).%ms] %V [%c] [%F:%L:%U] %m%n"
storage_detailed =  "[%d(%T).%ms] %V [%c] [%F:%L:%U] %m%n"
notice_detailed  =  "[%d(%T).%ms] [1;32m%V[0;39m [%c] [%F:%L:%U] %m%n"
warn_detailed    =  "[%d(%T).%ms] [1;33m%V[0;39m [%c] [%F:%L:%U] %m%n"
error_detailed   =  "[%d(%T).%ms] [1;31m%V[0;39m [%c] [%F:%L:%U] %m%n"
fatal_detailed   =  "[%d(%T).%ms] [1;35m%V[0;39m [%c] [%F:%L:%U] %m%n"

[rules]
*.=DEBUG   >stdout; storage_compact
*.=INFO    >stdout; storage_compact
*.=NOTICE  >stdout; notice_detailed
*.=WARN    >stdout; warn_detailed
*.=ERROR   >stdout; error_detailed
*.=FATAL   >stdout; fatal_detailed

# tty命令查看telnet绑定的伪终端
# *.=DEBUG   "/dev/pts/0"; storage_compact
# *.=INFO    "/dev/pts/0"; storage_compact
# *.=NOTICE  "/dev/pts/0"; notice_detailed
# *.=WARN    "/dev/pts/0"; warn_detailed
# *.=ERROR   "/dev/pts/0"; error_detailed
# *.=FATAL   "/dev/pts/0"; fatal_detailed

*.INFO  "/tmp/eye_info.log", 1M * 3; storage_detailed
*.WARN  "/tmp/eye_warn.log", 1M * 2; storage_detailed
